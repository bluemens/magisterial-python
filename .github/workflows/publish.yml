name: Publish to PyPI

# Publishes on GitHub release. Uses PyPI Trusted Publishing (OIDC) — configure
# this repo as a trusted publisher for the `magisterial` project on PyPI;
# no API token secret needed.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
